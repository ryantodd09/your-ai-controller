name: Update latest issues

# Refreshes the homepage "Latest issues" cards from the beehiiv API.
# Runs daily and on-demand. Needs the BEEHIIV_API_KEY repo secret
# (BEEHIIV_PUBLICATION_ID optional - auto-discovered if absent).

on:
  schedule:
    - cron: "0 13 * * *" # daily at 13:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Update latest issues from beehiiv
        env:
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
        run: node scripts/update-latest-issues.mjs
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Auto-update latest issues from beehiiv"
            git push
          else
            echo "No changes to commit."
          fi
